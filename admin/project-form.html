<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FabLab Bremen - Projekt-Verwaltung</title>
  
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/inputs.css">
  <link rel="stylesheet" href="css/main.css">
  
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
</head>
<body class="dark-theme">

  <nav class="admin-nav">
    <div class="nav-brand">
      <a href="dashboard.html" class="back-link">← Zurück zum Dashboard</a>
    </div>
    <div class="nav-user-zone"><span id="admin-name">Admin</span></div>
  </nav>

  <main class="form-container section-padding">
    <header class="form-header">
<h1 id="page-title">Neues Projekt anlegen</h1>
      <p id="audit-badge" class="subtitle">Erstellt von: Wird geladen...</p>
    </header>
    
    <form id="project-form" class="admin-form-card">
      <div class="input-container">
      <div class="form-group">
        <label for="pj-title">Project Titel</label>
        <input type="text" id="pj-title" required placeholder="z.B. 3D-Druck für Einsteiger">
      </div>

      <div class="form-row">
        <div class="form-group">
<label for="pj-mintstep">Ist es ein MINTsteps-Projekt?</label>
    <div class="select-wrapper">
    <select name="pj-mintstep" id="pj-mintstep">
<option value="false">Nein</option>
<option value="true">Ja</option>
          </select>
    </div>
        </div>
        
        <div class="form-group">
          <label for="pj-date">Datum & Uhrzeit</label>
          <input type="datetime-local" id="pj-date" required>
        </div>
      </div>

      <div class="form-group image-uploads-group">
  <label>Bilder (Max. 3 URLs)</label>
  
  <div class="img-input-container">
    <input type="url" class="pj-img-input" id="img-url-1" placeholder="Bild-URL 1 (Hauptbild)">
    <label class="quick-upload-btn">
      📎 Upload <input type="file" class="quick-converter" data-target="img-url-1" accept="image/*" style="display: none;">
    </label>
  </div>

  <div class="img-input-container">
    <input type="url" class="pj-img-input" id="img-url-2" placeholder="Bild-URL 2 (Optional)">
    <label class="quick-upload-btn">
      📎 Upload <input type="file" class="quick-converter" data-target="img-url-2" accept="image/*" style="display: none;">
    </label>
  </div>

  <div class="img-input-container">
    <input type="url" class="pj-img-input" id="img-url-3" placeholder="Bild-URL 3 (Optional)">
    <label class="quick-upload-btn">
      📎 Upload <input type="file" class="quick-converter" data-target="img-url-3" accept="image/*" style="display: none;">
    </label>
  </div>
</div>


      </div>

      <div class="editor-container">

        <div class="form-group HTML-editor-zone">
          <label>Beschreibung / Inhalte</label>
          <div id="editor-container" style="height: 300px; background: #1f2833; color: #fff;"></div>
        </div>
        
        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn-primary">Project veröffentlichen</button>
        </div>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  
  <script type="module" src="js/projects.js"></script>
</body>
</html>
