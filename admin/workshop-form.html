<!DOCTYPE html>
<html lang="de">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FabLab Bremen - Workshop-Verwaltung</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components/buttons.css">
  <link rel="stylesheet" href="../css/components/inputs.css">
  <link rel="stylesheet" href="css/main.css">

  <!-- Quill removed — replaced with the custom block editor below -->
  <link rel="stylesheet" href="css/block-editor.css">
</head>
<body class="dark-theme">


  <header class="main-header admin-nav">
    <div class="header-container">    <div class="nav-brand">
      <a href="workshops.html" class="back-link">← Zurück zur Übersicht</a>
    </div>
    <div class="nav-user-zone"><span id="admin-name">Admin</span></div>
  </div>
  </header>

  <main class="form-container section-padding">
    <header class="form-header">
      <h1 id="page-title">Neuen Workshop anlegen</h1>
      <p id="audit-badge" class="subtitle">Erstellt von: Wird geladen...</p>
    </header>

    <form id="workshop-form" class="admin-form-card">
      <div class="input-container">
      <div class="form-group">
        <label for="ws-title">Workshop Titel</label>
        <input type="text" id="ws-title" required placeholder="z.B. 3D-Druck für Einsteiger">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="ws-price">Preis (Leer lassen für 'Kostenlos')</label>
          <input type="text" id="ws-price" placeholder="Kostenlos">
        </div>
        <div class="form-group">
          <label for="ws-date">Datum & Uhrzeit</label>
          <input type="datetime-local" id="ws-date" required>
        </div>
      </div>

      <div class="form-group">
        <label for="ws-reg-link">Anmeldelink (Externe Form-URL - Optional)</label>
        <input type="url" id="ws-reg-link" placeholder="https://anmeldung.fablab-bremen.org/...">
      </div>

     <div class="form-group image-uploads-group">
  <label>Bilder (Max. 3 URLs)</label>

  <div class="img-input-container">
    <input type="url" class="ws-img-input" id="img-url-1" placeholder="Bild-URL 1 (Hauptbild)">
    <label class="quick-upload-btn">
      📎 Upload <input type="file" class="quick-converter" data-target="img-url-1" accept="image/*" style="display: none;">
    </label>
  </div>

  <div class="img-input-container">
    <input type="url" class="ws-img-input" id="img-url-2" placeholder="Bild-URL 2 (Optional)">
    <label class="quick-upload-btn">
      📎 Upload <input type="file" class="quick-converter" data-target="img-url-2" accept="image/*" style="display: none;">
    </label>
  </div>

  <div class="img-input-container">
    <input type="url" class="ws-img-input" id="img-url-3" placeholder="Bild-URL 3 (Optional)">
    <label class="quick-upload-btn">
      📎 Upload <input type="file" class="quick-converter" data-target="img-url-3" accept="image/*" style="display: none;">
    </label>
  </div>
</div>


      </div>

      <div class="editor-container">

        <div class="form-group HTML-editor-zone">
          <label>Beschreibung / Inhalte</label>
          <div id="block-editor-root"></div>
          
          <div id="pageBottom"></div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn-primary">Workshop veröffentlichen</button>
        </div>
        
      </div>
    </form>

    <!--TO SCROLL TOT HE BOTTOM-->
  </main>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/workshops.js"></script>
</body>
</html>
